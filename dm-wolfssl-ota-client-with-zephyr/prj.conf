CONFIG_UART_CONSOLE=y

# Link and flash the application into the board-defined code partition
# (slot0_partition at 0x10010000 on FRDM-MCXN947).
CONFIG_USE_DT_CODE_PARTITION=y

# Reserve 0x200 bytes at the start of the code partition for an image header.
CONFIG_ROM_START_OFFSET=0x200

# Linker base remap: use alias addresses instead of physical bus addresses.
CONFIG_FLASH_BASE_ADDRESS=0x0
CONFIG_SRAM_BASE_ADDRESS=0x20016000

# Clock for time()
CONFIG_CLOCK_CONTROL=y

# Log settings. Using immediate mode to not drop bursty logs
CONFIG_LOG=y
CONFIG_LOG_PRINTK=n

# Enable float support for printf/printk
CONFIG_CBPRINTF_FP_SUPPORT=y

CONFIG_MAIN_STACK_SIZE=32768

CONFIG_ASSERT=y

# POSIX Settings
CONFIG_POSIX_API=y

# Network settings
CONFIG_NETWORKING=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_AUTO_INIT=n
CONFIG_NET_CONFIG_NEED_IPV4=n
CONFIG_NET_DHCPV4=n
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IPV6=n
CONFIG_NET_CONFIG_NEED_IPV6=n
CONFIG_NET_IPV4=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_TCP=y 
CONFIG_DNS_RESOLVER=y

# Disable Flash API as the flash operations are handled by wolfBoot NSC APIs.
CONFIG_FLASH=n
CONFIG_SOC_FLASH_MCUX=n
# TLS configuration

CONFIG_WOLFSSL=y
CONFIG_WOLFSSL_BUILTIN=y
CONFIG_WOLFSSL_DEBUG=n
CONFIG_WOLFSSL_TLS_VERSION_1_2=y
CONFIG_WOLFSSL_TLS_VERSION_1_3=y

# MQTT configuration
CONFIG_WOLFMQTT=y
CONFIG_WOLFMQTT_TLS=y
# Enable wolfMQTT user settings to adjust the configuration as same as wolfSSL
CONFIG_WOLFMQTT_SETTINGS_FILE="user_settings.h"

# CONFIG_NET_BUF_DATA_SIZE=512
CONFIG_NET_BUF_DATA_SIZE=1536

CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

#ETHERNET
CONFIG_ETH_NXP_ENET_QOS=y
CONFIG_ETH_NXP_ENET_QOS_MAC=y

CONFIG_WOLFSSL_SETTINGS_FILE="user_settings.h"

# For debug
CONFIG_DEBUG_OPTIMIZATIONS=n

CONFIG_REBOOT=y

# TrustZone settings
# Build this Zephyr image for Non-Secure state execution.
CONFIG_TRUSTED_EXECUTION_SECURE=n
CONFIG_TRUSTED_EXECUTION_NONSECURE=y

# Early SoC init hook: FPU/PowerQuad coprocessor access, ECC, flash cache,
# and aGDET setup for NS world (replaces SystemInit() which now skips NS).
CONFIG_SOC_EARLY_INIT_HOOK=y

# NS board defconfig enables TF-M; this project uses wolfBoot on the secure side.
CONFIG_BUILD_WITH_TFM=n